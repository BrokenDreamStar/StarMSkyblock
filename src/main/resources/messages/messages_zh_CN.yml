# StarMSkyblock i18n 默认语言文件（zh_CN）
# 键命名约定：层级点分式 kebab-case，最多 4 层
# 占位符：{name} 命名式

general:
  placeholder: "&7i18n 系统已就绪"
  island-not-found: "&c你还没有岛屿！"
  player-not-found: "&c玩家不存在或不在线！"
  cannot-remove-owner: "&c你不能移除岛主！"
  operation-failed: "&c操作失败，请稍后重试。"
team:
  usage:
    header: "&c用法:"
    list: "&b/is team list &f- 查看岛屿成员列表"
    invite: "&b/is team invite <玩家> &f- 邀请玩家加入岛屿"
    remove: "&b/is team remove <玩家> [confirm] &f- 移除岛屿成员"
    accept: "&b/is team accept &f- 接受岛屿邀请"
    decline: "&b/is team decline &f- 拒绝岛屿邀请"
    summary: "&c用法: /is team list|invite|remove|accept|decline"
  unknown-subcommand: "&c未知的子命令: &e{subcommand}"
  list:
    header: "&a=== 岛屿成员列表 ==="
    owner: "&6岛主: &e{name} &6({role}){status}"
    member: "&b成员: &e{name} &b({role}){status}"
    no-members: "&7暂无其他成员"
  invite:
    no-permission: "&c你没有权限邀请成员！"
    usage: "&c用法: /is team invite <玩家名>"
    self: "&c你不能邀请自己！"
    waiting: "&7等待对方确认..."
    failed: "&c邀请失败！该玩家可能已有岛屿或已有待处理的邀请。"
    no-pending: "&c你没有待处理的岛屿邀请！"
  accept:
    success: "&a你已成功加入岛屿！"
    failed: "&c接受邀请失败，邀请可能已过期或你已有岛屿。"
  decline:
    success: "&c你已拒绝岛屿邀请"
    failed: "&c拒绝邀请失败，请稍后重试。"
  remove:
    no-permission: "&c你没有权限踢出成员！"
    usage: "&c用法: /is team remove <玩家名> [confirm]"
    not-member: "&c该玩家不是岛屿成员！"
    confirm: "&c警告：将移除 &e{name} &c，使用 &e/is team remove {name} confirm &c确认。"
    success: "&a成功踢出 &e{name} &a从岛屿"
    removed: "&c你已被 {player} &c从岛屿移除"
    failed: "&c移除失败，该玩家可能不是岛屿成员。"
coop:
  usage:
    header: "&c用法:"
    add: "&b/is coop add <玩家> &f- 添加合作者"
    remove: "&b/is coop remove <玩家> &f- 移除合作者"
    summary: "&c用法: /is coop add|remove <玩家名>"
  unknown-subcommand: "&c未知的子命令: &e{subcommand}"
  add:
    no-permission: "&c你没有权限邀请合作者！"
    usage: "&c用法: /is coop add <玩家名>"
    self: "&c你不能将自己添加为合作者！"
    target-no-island: "&c该玩家没有岛屿，无法添加为合作者！"
    already-coop: "&c该玩家已经是合作者！"
    already-member: "&c该玩家已经是岛屿成员，无法添加为合作者！"
    success: "&a已将 &e{name} &a添加为合作者！"
    added: "&a你已被 &e{player} &a添加为岛屿合作者！"
  remove:
    no-permission: "&c你没有权限移除合作者！"
    usage: "&c用法: /is coop remove <玩家名>"
    not-coop: "&c该玩家不是合作者！"
    success: "&a已移除合作者 &e{name}"
    removed: "&c你已被 &e{player} &c移出岛屿合作者队伍"
