# ============================================================
# StarMSkyblock 任务系统 — 完整示例配置
# ============================================================
# 将此文件的内容按需复制到 tasks.yml 中即可生效。
# 分类(categories)下的每个任务(task)使用独立 ID，不可重复。
# ============================================================

categories:

  # ==================== 开采类 ====================
  mining:
    name: "&e开采"
    slot: 20
    tasks:

      # 示例 1: 破坏方块 (BLOCK_BREAK)
      miner_1:
        name: "&a初级矿工 I"
        task-type: BLOCK_BREAK
        auto-reward: false
        reset-after-finish: true
        required-missions: []
        requirements:
          '1':
            types:
              - "STONE"
              - "COBBLESTONE"
            amount: 48
          '2':
            types:
              - "COAL_ORE"
            amount: 16
        rewards:
          items:
            '1':
              type: DIAMOND
              amount: 1
          commands:
            - "eco give %player% 1000"
            - "msg %player% &a恭喜完成初级矿工任务！"

      # 示例 2: 带前置任务 (required-missions)
      miner_2:
        name: "&a中级矿工 II"
        task-type: BLOCK_BREAK
        auto-reward: false
        reset-after-finish: true
        required-missions:
          - "miner_1"
        requirements:
          '1':
            types:
              - "IRON_ORE"
            amount: 32
          '2':
            types:
              - "GOLD_ORE"
            amount: 16
        rewards:
          commands:
            - "eco give %player% 5000"
            - "msg %player% &a中级矿工任务完成！"

  # ==================== 狩猎类 ====================
  slayer:
    name: "&c狩猎"
    slot: 21
    tasks:
      slayer_1:
        name: "&c初级猎手 I"
        task-type: ENTITY_KILL
        auto-reward: false
        reset-after-finish: true
        required-missions: []
        requirements:
          '1':
            types:
              - "ZOMBIE"
              - "SKELETON"
              - "CREEPER"
            amount: 10
        rewards:
          commands:
            - "eco give %player% 2000"

  # ==================== 种植类 ====================
  farming:
    name: "&a种植"
    slot: 22
    tasks:
      farmer_1:
        name: "&a初级农夫 I"
        task-type: FARMING
