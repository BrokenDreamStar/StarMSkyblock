        auto-reward: false
        reset-after-finish: true
        required-missions: []
        requirements:
          '1':
            types:
              - "money"
            amount: 5000
        rewards:
          commands:
            - "eco give %player% 1000"

  # ==================== 放置类 ====================
  builder:
    name: "&3建筑"
    slot: 29
    tasks:
      builder_1:
        name: "&3初级建筑师 I"
        task-type: BLOCK_PLACE
