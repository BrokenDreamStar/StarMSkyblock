# ============================================
# 方块数量上限
# 每种方块在单次岛屿扫描中的有效计数上限。
# 上限基于"实际放置数 - 模板基线(初始空岛自带)"计算，超出上限的部分：
#   - 启用超额递减(diminishing)时：按递减公式继续产生经验值
#   - 未启用递减时：超额部分经验值为 0
# 未在此处列出的方块无上限（Long.MAX_VALUE）。
# 格式: MATERIAL_NAME: 数量上限
# ============================================
limits:
  NETHERITE_BLOCK: 30000
  EMERALD_BLOCK: 30000
  DIAMOND_BLOCK: 50000

# ============================================
# 超额经验值递减配置
# 达到阈值后，超额方块按递减公式逐渐降低经验值，最终趋于最低值。
# decay:   递减系数（越大下降越快）
#          每增加一个超额方块：value = baseValue / (1 + decay × 超额数量)
#          decay=0.001 → 约 1000 块后价值折半
#          decay=0.0005 → 约 2000 块后价值折半
# minimum: 单个方块的最低经验值（最低为 1）
# 仅对 limits 中配置了阈值的方块有效。
# 未配置本段或 enabled: false 时超额方块的经验值直接为0。
# ============================================
diminishing:
  enabled: true
  decay: 0.03
  minimum: 1
# ============================================
# 等级经验值消耗（幂函数增长）
# base:  升到 1 级所需的基础经验值
# power: 指数系数，控制每级增长幅度
# 当 level-cost 存在时，level-formula 配置会被忽略。
# 公式：cost(L) = Math.round(base × L^power)
# 示例：base=50, power=1.2 时
#   1 级需要 50 经验值（累计 50）
#   2 级需要 115 经验值（累计 165）
#   3 级需要 187 经验值（累计 352）
#   4 级需要 264 经验值（累计 616）
# ============================================
level-cost:
  base: 50
  power: 1.2
# ============================================
# 等级计算公式（旧版，仅当 level-cost 不存在时生效）
# {experience} = 岛屿上所有方块的总经验（阈值内全额 + 超额递减部分）
# 兼容旧版 {points} 写法
# 支持运算: + - * / 和 ()
# ============================================
# level-formula: "{experience} / 100"

# ============================================
# AuraSkills 对岛屿等级的贡献配置
# 岛屿所有成员的 AuraSkills PowerLevel 总和将按比例转换为额外的岛屿等级
# ============================================
auraskills:
  # 是否启用 AuraSkills 加成
  enabled: true
  # 加成等级 = 全体成员 PowerLevel 总和 / coefficient
  # 例如 coefficient: 20, 全体成员 PowerLevel 总和为 500, 则加成 25 级
  coefficient: 45.0
  # 最大加成等级上限，0 表示不限制
  max-bonus-level: 0
