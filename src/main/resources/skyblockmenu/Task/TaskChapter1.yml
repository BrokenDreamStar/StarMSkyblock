Title: '任务-序章 初临空岛'

Options:
  Arguments: false
  Min-Click-Delay: 200

Events:
  Open:
    - 'delay: 5'
    - 'refresh: A;B;C;D;E;F'
    - 'update: A;B;C;D;E;F'

Layout:
  - '########<'
  - '#ABCDEF #'
  - '#########'

Icons:
  '#':
    display:
      material: GRAY_STAINED_GLASS_PANE
      name: '&r'
      hideTooltip: true

  '<':
    display:
      material: RED_STAINED_GLASS_PANE
      name: '&6返回'
    actions:
      all:
        - 'menu: Tasks'

  'A':
    display:
      material: COBBLESTONE
      name: '&f&l空岛 启动!'
      lore:
        - '&f制造刷石机并刷取一些圆石'
        - ''
        - '&6要求:'
        - ' - &f挖掘 圆石 x128'
        - ''
        - '&d奖励:'
        - ' - &f硬币 x1000'
        - ' - &f铜镐(耐久3 效率3) x1'
        - ''
        - '&b进度: %starmskyblock_task_1_1_progress% %'
    icons:
      - condition: 'check papi %starmskyblock_task_1_1_completed% == "true"'
        priority: 0
        inherit: true
        display:
          shiny: 'true'
          lore:
            - '&f制造刷石机并刷取一些圆石'
            - ''
            - '&6要求:'
            - ' - &f挖掘 圆石 x128'
