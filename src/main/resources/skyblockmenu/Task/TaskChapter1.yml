            - ''
            - '&b进度: 100 %'
            - '&2点击领取奖励'
        actions:
          left:
            - 'sound: UI_BUTTON_CLICK-1-2'
            - 'command: is task claim 1 1'
            - 'delay: 3'
            - 'refresh: A'
            - 'update: A'
      - condition: 'check papi %starmskyblock_task_1_1_claimed% == "true"'
