Title: '岛屿权限管理-工具'

Options:
  Min-Click-Delay: 200

Layout:
  - '########<'
  - '#ABCDEFG#'
  - '#HIJKL  #'
  - '#########'

Icons:
  '#':
    display:
      material: GRAY_STAINED_GLASS_PANE
      name: '&r'
      hideTooltip: true

  '<':
    display:
      material: RED_STAINED_GLASS_PANE
      name: '&6返回'
    actions:
      all:
        - 'menu: Permissions'

  'A':
    update: 30
    refresh: 30
    display:
      material: BOW
      name: '&a使用弓/弩'
      lore:
        - '&f使用弓/弩'
        - ''
        - '&7允许给:'
        - '- &a岛主'
        - '- %starmskyblock_permission_BOW_USE_level_ADMIN%'
        - '- %starmskyblock_permission_BOW_USE_level_MOD%'
        - '- %starmskyblock_permission_BOW_USE_level_MEMBER%'
        - '- %starmskyblock_permission_BOW_USE_level_COOP%'
        - '- %starmskyblock_permission_BOW_USE_level_VISITOR%'
        - ''
        - '&e点击切换权限组'
    actions:
      left:
        - 'sound: UI_BUTTON_CLICK-1-2'
        - 'command: is permission bow_use cycle -s'
        - 'delay: 5'
        - 'update'
        - 'refresh'
      right:
        - 'sound: UI_BUTTON_CLICK-1-2'
        - 'command: is permission bow_use rcycle -s'
        - 'delay: 5'
        - 'update'
        - 'refresh'

    icons:
