      all:
        - 'menu: Permissions'

  'A':
    update: 30
    refresh: 30
    display:
      material: PIG_SPAWN_EGG
      name: '&a使用刷怪蛋'
      lore:
        - '&f使用刷怪蛋'
        - ''
        - '&7允许给:'
        - '- &a岛主'
        - '- %starmskyblock_permission_SPAWN_EGG_USE_level_ADMIN%'
        - '- %starmskyblock_permission_SPAWN_EGG_USE_level_MOD%'
        - '- %starmskyblock_permission_SPAWN_EGG_USE_level_MEMBER%'
        - '- %starmskyblock_permission_SPAWN_EGG_USE_level_COOP%'
        - '- %starmskyblock_permission_SPAWN_EGG_USE_level_VISITOR%'
        - ''
        - '&e点击切换权限组'
    actions:
      left:
        - 'sound: UI_BUTTON_CLICK-1-2'
        - 'command: is permission spawn_egg_use cycle -s'
        - 'delay: 5'
        - 'update'
        - 'refresh'
      right:
        - 'sound: UI_BUTTON_CLICK-1-2'
        - 'command: is permission spawn_egg_use rcycle -s'
