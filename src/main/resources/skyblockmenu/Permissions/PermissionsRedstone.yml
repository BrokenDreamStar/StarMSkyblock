Title: '岛屿权限管理-红石'

Options:
  Min-Click-Delay: 200

Layout:
  - '########<'
  - '#ABCDEFG#'
  - '#HIJ    #'
  - '#########'

Icons:
  '#':
    display:
      material: GRAY_STAINED_GLASS_PANE
      name: '&r'
      hideTooltip: true

  '<':
    display:
      material: RED_STAINED_GLASS_PANE
      name: '&6返回'
    actions:
      all:
        - 'menu: Permissions'

  'A':
    update: 30
    refresh: 30
    display:
      material: STONE_BUTTON
      name: '&a按按钮'
      lore:
        - '&f按按钮'
        - ''
        - '&7允许给:'
        - '- &a岛主'
        - '- %starmskyblock_permission_BUTTON_PRESS_level_ADMIN%'
        - '- %starmskyblock_permission_BUTTON_PRESS_level_MOD%'
        - '- %starmskyblock_permission_BUTTON_PRESS_level_MEMBER%'
        - '- %starmskyblock_permission_BUTTON_PRESS_level_COOP%'
        - '- %starmskyblock_permission_BUTTON_PRESS_level_VISITOR%'
        - ''
        - '&e点击切换权限组'
    actions:
      left:
        - 'sound: UI_BUTTON_CLICK-1-2'
        - 'command: is permission button_press cycle -s'
        - 'delay: 5'
        - 'update'
        - 'refresh'
      right:
        - 'sound: UI_BUTTON_CLICK-1-2'
        - 'command: is permission button_press rcycle -s'
        - 'delay: 5'
        - 'update'
        - 'refresh'

    icons:
      - condition: 'check papi "%starmskyblock_haspermission_EDIT_PERMISSIONS%" == "false"'
        inherit: true
        display:
          lore:
            - '&f按按钮'
