    update: 30
    refresh: 30
    display:
      material: OAK_TRAPDOOR
      name: '&a开关活板门'
      lore:
        - '&f开关活板门'
        - ''
        - '&7允许给:'
        - '- &a岛主'
        - '- %starmskyblock_permission_TRAPDOOR_OPEN_level_ADMIN%'
