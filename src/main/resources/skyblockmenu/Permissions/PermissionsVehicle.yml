Title: '岛屿权限管理-载具'

Options:
  Min-Click-Delay: 200

Layout:
  - '########<'
  - '#ABCDEF #'
  - '#########'

Icons:
  '#':
    display:
      material: GRAY_STAINED_GLASS_PANE
      name: '&r'
      hideTooltip: true

  '<':
    display:
      material: RED_STAINED_GLASS_PANE
      name: '&6返回'
    actions:
      all:
        - 'menu: Permissions'

  'A':
    update: 30
    refresh: 30
    display:
      material: MINECART
      name: '&c破坏矿车'
      lore:
        - '&f破坏矿车/漏斗矿车/箱子矿车/运输矿车/TNT矿车'
        - ''
        - '&7允许给:'
        - '- &a岛主'
        - '- %starmskyblock_permission_MINECART_DAMAGE_level_ADMIN%'
        - '- %starmskyblock_permission_MINECART_DAMAGE_level_MOD%'
        - '- %starmskyblock_permission_MINECART_DAMAGE_level_MEMBER%'
        - '- %starmskyblock_permission_MINECART_DAMAGE_level_COOP%'
        - '- %starmskyblock_permission_MINECART_DAMAGE_level_VISITOR%'
        - ''
        - '&e点击切换权限组'
    actions:
      left:
        - 'sound: UI_BUTTON_CLICK-1-2'
        - 'command: is permission minecart_damage cycle -s'
        - 'delay: 5'
        - 'update'
        - 'refresh'
      right:
        - 'sound: UI_BUTTON_CLICK-1-2'
        - 'command: is permission minecart_damage rcycle -s'
        - 'delay: 5'
        - 'update'
        - 'refresh'

    icons:
      - condition: 'check papi "%starmskyblock_haspermission_EDIT_PERMISSIONS%" == "false"'
        inherit: true
        display:
          lore:
            - '&f破坏矿车/漏斗矿车/箱子矿车/运输矿车/TNT矿车'
            - ''
            - '&7允许给:'
