Title: '岛屿权限管理-管理权限'

Options:
  Min-Click-Delay: 200

Layout:
  - '########<'
  - '#ABCDEFG#'
  - '#HIJKL  #'
  - '#########'

Icons:
  '#':
    display:
      material: GRAY_STAINED_GLASS_PANE
      name: '&r'
      hideTooltip: true

  '<':
    display:
      material: RED_STAINED_GLASS_PANE
      name: '&6返回'
    actions:
      all:
        - 'menu: Permissions'

  'A':
    update: 30
    refresh: 30
    display:
      material: BARRIER
      name: '&4删除岛屿'
      lore:
        - '&f删除岛屿'
        - ''
        - '&7允许给:'
        - '- &a岛主'
        - ''
        - '&e点击切换权限组'
    actions:
      all:
        - 'sound: UI_BUTTON_CLICK-1-2'

    icons:
      - condition: 'check papi "%starmskyblock_haspermission_EDIT_PERMISSIONS%" == "false"'
        inherit: true
        display:
          lore:
            - '&f删除岛屿'
            - ''
            - '&7允许给:'
            - '- &a岛主'
            - ''
            - '&c你没有权限修改'

