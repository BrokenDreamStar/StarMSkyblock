Title: '岛屿权限管理-容器'

Options:
  Min-Click-Delay: 200

Layout:
  - '########<'
  - '#ABCDEFG#'
  - '#HIJKLMN#'
  - '#OPQRS  #'
  - '#########'

Icons:
  '#':
    display:
      material: GRAY_STAINED_GLASS_PANE
      name: '&r'
      hideTooltip: true

  '<':
    display:
      material: RED_STAINED_GLASS_PANE
      name: '&6返回'
    actions:
      all:
        - 'menu: Permissions'

  'A':
    update: 30
    refresh: 30
    display:
      material: FURNACE
      name: '&a使用熔炉'
      lore:
        - '&f使用熔炉'
        - ''
        - '&7允许给:'
        - '- &a岛主'
        - '- %starmskyblock_permission_FURNACE_OPEN_level_ADMIN%'
        - '- %starmskyblock_permission_FURNACE_OPEN_level_MOD%'
        - '- %starmskyblock_permission_FURNACE_OPEN_level_MEMBER%'
        - '- %starmskyblock_permission_FURNACE_OPEN_level_COOP%'
        - '- %starmskyblock_permission_FURNACE_OPEN_level_VISITOR%'
        - ''
        - '&e点击切换权限组'
    actions:
      left:
        - 'sound: UI_BUTTON_CLICK-1-2'
        - 'command: is permission furnace_open cycle -s'
        - 'delay: 5'
        - 'update'
        - 'refresh'
      right:
        - 'sound: UI_BUTTON_CLICK-1-2'
        - 'command: is permission furnace_open rcycle -s'
        - 'delay: 5'
        - 'update'
        - 'refresh'

    icons:
      - condition: 'check papi "%starmskyblock_haspermission_EDIT_PERMISSIONS%" == "false"'
