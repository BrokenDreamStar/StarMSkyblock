Title: '岛屿权限管理-工作方块'

Options:
  Min-Click-Delay: 200

Layout:
  - '########<'
  - '#ABCDEFG#'
  - '#HIJKLMN#'
  - '#########'

Icons:
  '#':
    display:
      material: GRAY_STAINED_GLASS_PANE
      name: '&r'
      hideTooltip: true

  '<':
    display:
      material: RED_STAINED_GLASS_PANE
      name: '&6返回'
    actions:
      all:
        - 'menu: Permissions'

  'A':
    update: 30
    refresh: 30
    display:
      material: CRAFTING_TABLE
      name: '&a使用工作台'
      lore:
        - '&f使用工作台'
        - ''
        - '&7允许给:'
        - '- &a岛主'
        - '- %starmskyblock_permission_CRAFTING_TABLE_USE_level_ADMIN%'
        - '- %starmskyblock_permission_CRAFTING_TABLE_USE_level_MOD%'
        - '- %starmskyblock_permission_CRAFTING_TABLE_USE_level_MEMBER%'
        - '- %starmskyblock_permission_CRAFTING_TABLE_USE_level_COOP%'
        - '- %starmskyblock_permission_CRAFTING_TABLE_USE_level_VISITOR%'
        - ''
        - '&e点击切换权限组'
    actions:
      left:
        - 'sound: UI_BUTTON_CLICK-1-2'
        - 'command: is permission crafting_table_use cycle -s'
        - 'delay: 5'
        - 'update'
        - 'refresh'
      right:
        - 'sound: UI_BUTTON_CLICK-1-2'
        - 'command: is permission crafting_table_use rcycle -s'
        - 'delay: 5'
        - 'update'
        - 'refresh'

    icons:
      - condition: 'check papi "%starmskyblock_haspermission_EDIT_PERMISSIONS%" == "false"'
        inherit: true
        display:
          lore:
            - '&f使用工作台'
            - ''
            - '&7允许给:'
            - '- &a岛主'
            - '- %starmskyblock_permission_CRAFTING_TABLE_USE_level_ADMIN%'
