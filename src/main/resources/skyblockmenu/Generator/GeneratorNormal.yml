Title: '岛屿刷石机设置-主世界'

Options:
  Arguments: false
  Min-Click-Delay: 200

Events:
  Open:
    - 'delay: 3'
    - 'update: X;B;C;D;E;F;G;H;I;J'
    - 'refresh: X;B;C;D;E;F;G;H;I;J'

Layout:
  - '!#######<'
  - '#ABCDEFG#'
  - '#HIJ    #'
  - '~#######X'

Icons:
  '!':
    display:
      material: BOOK
      name: '&6&l说明'
      lore:
        - '&e当矿石被禁用时'
        - '&e该矿石在生成时会被替换为默认产物'
        - '&e不会因为禁用而提升其它矿石生成概率'
        - ''
        - '&f默认产物:'
        - '&a主世界-圆石&7,&c下界-玄武岩&7,&e末地-末地石'

  '#':
    display:
      material: GRAY_STAINED_GLASS_PANE
      name: '&r'
      hideTooltip: true

  '<':
    display:
      material: RED_STAINED_GLASS_PANE
      name: '&6&l返回'
    actions:
      all:
        - 'menu: Generator'

  '~':
    display:
      material: DEEPSLATE
      name: '&7&l深板岩替换'
      lore:
        - '&e在主世界Y0以下(不含Y0)'
        - '&e生成的石头会变为深板岩'
        - '&e生成的圆石会变为深板岩圆石'
        - '&e生成的矿石会变为深层变种'

  'X':
    update: 20
    refresh: 20
    display:
      material: BARRIER
      name: '&c&l禁用全部矿石'
    actions:
      left:
        - 'sound: UI_BUTTON_CLICK-1-2'
        - 'command: is generator normal all false -s'
        - 'delay: 3'
        - 'update: X;B;C;D;E;F;G;H;I;J'
        - 'refresh: X;B;C;D;E;F;G;H;I;J'
    icons:
      - condition: 'check papi %starmskyblock_generator_normal_all% == "false"'
        display:
          material: STRUCTURE VOID
          name: '&a&l启用全部矿石'
        actions:
          left:
            - 'sound: UI_BUTTON_CLICK-1-2'
            - 'command: is generator normal all true -s'
            - 'delay: 3'
            - 'update: X;B;C;D;E;F;G;H;I;J'
            - 'refresh: X;B;C;D;E;F;G;H;I;J'
  'A':
    display:
      material: COBBLESTONE
      name: '&7&l圆石'
      shiny: 'true'
      lore:
        - '&b是否生成: &a是'

  'B':
    update: 20
    refresh: 20
    display:
      material: STONE
      name: '&7&l石头'
      lore:
        - '&b是否生成: %starmskyblock_generator_normal_STONE%'
        - '&e点击切换设置'
    actions:
      left:
        - 'sound: UI_BUTTON_CLICK-1-2'
        - 'command: is generator normal STONE toggle -s'
        - 'delay: 3'
        - 'update: B;X'
        - 'refresh: B;X'
    icons:
      - condition: 'check papi %starmskyblock_generator_normal_STONE_boolean% == "true"'
        inherit: true
        display:
          shiny: 'true'
        actions:
          left:
            - 'sound: UI_BUTTON_CLICK-1-2'
            - 'command: is generator normal STONE toggle -s'
            - 'delay: 3'
            - 'update: B;X'
            - 'refresh: B;X'

