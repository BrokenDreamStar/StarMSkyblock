      material: LILY_PAD
      name: '&7&l沼泽'
      lore:
        - '&a左键点击'
        - ' - &e左键修改&l当前所在区块&e生物群系为&7&l沼泽'
        - '&b右键点击'
        - ' - &e修改&l整个岛屿&e的生物群系为&7&l沼泽'
    actions:
      left:
        - 'sound: UI_BUTTON_CLICK-1-2'
        - 'Close'
        - 'command: is setchunkbiome swamp'
      right:
        - 'sound: UI_BUTTON_CLICK-1-2'
