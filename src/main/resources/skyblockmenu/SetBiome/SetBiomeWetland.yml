Title: '修改岛屿生物群系-湿地类'

Options:
  Min-Click-Delay: 200

Layout:
  - '########<'
  - '#ABCDEFG#'
  - '#########'

Icons:
  '#':
    display:
      material: GRAY_STAINED_GLASS_PANE
      name: '&r'
      hideTooltip: true

  '<':
    display:
      material: RED_STAINED_GLASS_PANE
      name: '&6返回'
    actions:
      all:
        - 'menu: SetBiome'

  'A':
