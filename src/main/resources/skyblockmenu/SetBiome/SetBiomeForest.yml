      material: OAK_SAPLING
      name: '&a&l森林'
      lore:
        - '&a左键点击'
        - ' - &e左键修改&l当前所在区块&e生物群系为&a&l森林'
        - '&b右键点击'
        - ' - &e修改&l整个岛屿&e的生物群系为&a&l森林'
    actions:
      left:
        - 'sound: UI_BUTTON_CLICK-1-2'
        - 'Close'
        - 'command: is setchunkbiome forest'
      right:
        - 'sound: UI_BUTTON_CLICK-1-2'
        - 'menu: SetBiomeConfirm Forest &a&l森林 forest'

