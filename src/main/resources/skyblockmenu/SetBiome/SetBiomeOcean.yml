Title: '修改岛屿生物群系-海洋类'

Options:
  Min-Click-Delay: 200

Layout:
  - '########<'
  - '#ABCDEFG#'
  - '#HIJ    #'
  - '#########'

Icons:
  '#':
    display:
      material: GRAY_STAINED_GLASS_PANE
      name: '&r'
      hideTooltip: true

  '<':
    display:
      material: RED_STAINED_GLASS_PANE
      name: '&6返回'
    actions:
      all:
        - 'menu: SetBiome'

  'A':
    display:
      material: WATER_BUCKET
      name: '&9&l海洋'
      lore:
        - '&a左键点击'
        - ' - &e左键修改&l当前所在区块&e生物群系为&9&l海洋'
        - '&b右键点击'
        - ' - &e修改&l整个岛屿&e的生物群系为&9&l海洋'
    actions:
      left:
        - 'sound: UI_BUTTON_CLICK-1-2'
        - 'Close'
        - 'command: is setchunkbiome ocean'
      right:
        - 'sound: UI_BUTTON_CLICK-1-2'
