Title: '修改岛屿生物群系-干旱类'

Options:
  Min-Click-Delay: 200

Layout:
  - '########<'
  - '#ABCDEFG#'
  - '#########'

Icons:
  '#':
    display:
      material: GRAY_STAINED_GLASS_PANE
      name: '&r'
      hideTooltip: true

  '<':
    display:
      material: RED_STAINED_GLASS_PANE
      name: '&6返回'
    actions:
      all:
        - 'menu: SetBiome'

  'A':
    display:
      material: ACACIA_SAPLING
      name: '&6&l热带草原'
      lore:
        - '&a左键点击'
        - ' - &e左键修改&l当前所在区块&e生物群系为&6&l热带草原'
        - '&b右键点击'
        - ' - &e修改&l整个岛屿&e的生物群系为&6&l热带草原'
    actions:
      left:
        - 'sound: UI_BUTTON_CLICK-1-2'
        - 'Close'
        - 'command: is setchunkbiome savanna'
      right:
        - 'sound: UI_BUTTON_CLICK-1-2'
