      right:
        - 'sound: UI_BUTTON_CLICK-1-2'
        - 'menu: SetBiomeConfirm Plains &e&l向日葵平原 sunflower_plains'

  'C':
    display:
      material: SNOW_BLOCK
      name: '&b&l雪原'
      lore:
        - '&a左键点击'
        - ' - &e左键修改&l当前所在区块&e生物群系为&b&l雪原'
        - '&b右键点击'
        - ' - &e修改&l整个岛屿&e的生物群系为&b&l雪原'
