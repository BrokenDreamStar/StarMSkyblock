Title: '修改岛屿生物群系-平原类'

Options:
  Min-Click-Delay: 200

Layout:
  - '########<'
  - '#ABCD   #'
  - '#########'

Icons:
  '#':
    display:
      material: GRAY_STAINED_GLASS_PANE
      name: '&r'
      hideTooltip: true

  '<':
    display:
      material: RED_STAINED_GLASS_PANE
      name: '&6返回'
    actions:
      all:
        - 'menu: SetBiome'

  'A':
    display:
      material: GRASS_BLOCK
      name: '&a&l平原'
      lore:
        - '&a左键点击'
        - ' - &e左键修改&l当前所在区块&e生物群系为&a&l平原'
        - '&b右键点击'
        - ' - &e修改&l整个岛屿&e的生物群系为&a&l平原'
    actions:
      left:
        - 'sound: UI_BUTTON_CLICK-1-2'
        - 'Close'
        - 'command: is setchunkbiome plains'
      right:
        - 'sound: UI_BUTTON_CLICK-1-2'
        - 'menu: SetBiomeConfirm Plains &a&l平原 plains'

  'B':
