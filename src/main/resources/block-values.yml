# ============================================
# 方块数量上限（阈值）
# 当某种方块的数量超过此阈值后，超额部分的经验值会按递减公式计算。
# 未配置的方块无上限限制。
# ============================================
limits:
  COBBLESTONE: 10000
  STONE: 5000
  NETHERRACK: 3000
  DIRT: 2000
  GRASS_BLOCK: 1000
  SAND: 3000
  GRAVEL: 2000
  DEEPSLATE: 3000
  TUFF: 1000
  BASALT: 2000
  BLACKSTONE: 2000
  GLASS: 500
  OAK_LOG: 1000
  SPRUCE_LOG: 1000
  BIRCH_LOG: 1000
  OAK_PLANKS: 3000
  SPRUCE_PLANKS: 3000
  BIRCH_PLANKS: 3000
  WATER: 1000
  LAVA: 500

# ============================================
# 超额经验值递减配置
# 达到阈值后，超额方块不再直接经验值为 0，
# 而是按递减公式逐渐降低经验值，最终趋于最低值。
# decay:   递减系数（越大经验值下降越快）
#          每增加一个超额方块：value = baseValue / (1 + decay * i)
#          decay=0.001 ≈ 1000 块后价值折半
#          decay=0.0005 ≈ 2000 块后价值折半
# minimum: 单个方块的最低经验值（最低为 1）
# 适用于所有在 limits 中配置了阈值的方块。
# 未配置本段 或 enabled: false 时保持原行为（超额经验值为 0）。
# ============================================
diminishing:
  enabled: true
  decay: 0.03
  minimum: 1.0

# ============================================
# 等级经验值消耗（幂函数增长）
# base:  升到 1 级所需的基础经验值
# power: 指数系数，控制每级增长幅度
# 当 level-cost 存在时，level-formula 配置会被忽略。
# 公式：cost(L) = Math.round(base × L^power)
# 示例：base=50, power=1.2 时
#   1 级需要 50 经验值（累计 50）
#   2 级需要 115 经验值（累计 165）
#   3 级需要 187 经验值（累计 352）
#   4 级需要 264 经验值（累计 616）
# ============================================
level-cost:
  base: 50.0
  power: 1.2

# ============================================
# 等级计算公式（旧版，仅当 level-cost 不存在时生效）
# {experience} = 岛屿上所有方块的总经验（阈值内全额 + 超额递减部分）
# 兼容旧版 {points} 写法
# 支持运算: + - * / 和 ()
# ============================================
# level-formula: "{experience} / 100"