# 公共区域权限与设置配置
# 适用于空岛世界中所有不归属于任何岛屿的区域
# true = 允许/启用, false = 禁止/禁用

# 是否启用公共区域保护
enabled: true


# 权限定义
permissions:
  # 管理权限（公共区域禁止所有管理操作）
  RENAME_ISLAND: false
  EDIT_PERMISSIONS: false
  EDIT_SETTINGS: false
  INVITE_MEMBER: false
  REMOVE_MEMBER: false
  SET_ROLE: false
  INVITE_COOP: false
  REMOVE_COOP: false
  SET_SPAWN: false
  SET_BIOME: false
  SET_GENERATOR: false

  # 物品丢弃/拾取
  ITEM_DROP: true
  ITEM_PICKUP: true
  EXP_PICKUP: true

  # 方块破坏/建造
  BREAK: false
  BUILD: false

  # 工作方块
  CRAFTING_TABLE_USE: false
  ENCHANTING_TABLE_USE: false
  BEACON_USE: false
  ANVIL_USE: false
  GRINDSTONE_USE: false
  CARTOGRAPHY_TABLE_USE: false
  STONECUTTER_USE: false
