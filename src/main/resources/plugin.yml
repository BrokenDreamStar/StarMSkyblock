name: StarMSkyblock
version: '1.0.0'

main: team.starm.starmskyblock.StarMSkyblock
api-version: '26.1.2'
load: POSTWORLD
softdepend: [PlaceholderAPI, WorldEdit, TrMenu]

authors: [BrokenDream_Star,Gemini,Grok,DeepSeek]
website: https://starm.team/
description: StarM的空岛插件

commands:
  is:
    description: 空岛主命令
    usage: /is <create|home|border|help>
    permission: skyblock.is
  isadmin:
    description: 空岛管理员命令
    usage: /isadmin setradius <id> <radius>
    permission: skyblock.admin
  istest:                                          # TEST COMMAND - REMOVE ME
    description: 测试命令 - 批量生成岛屿             # TEST COMMAND - REMOVE ME
    usage: /istest create <数量>                    # TEST COMMAND - REMOVE ME
    permission: skyblock.admin                     # TEST COMMAND - REMOVE ME

permissions:
  skyblock.is:
    description: 允许玩家使用基础空岛命令
    default: true
  skyblock.admin:
    description: 允许玩家使用管理员空岛命令
    default: op
